name: Build EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install AutoHotkey
        run: winget install AutoHotkey.AutoHotkey

      - name: Build EXE
        shell: powershell
        run: |
          & "C:\Program Files\AutoHotkey\Compiler\Ahk2Exe.exe" /in src\SysAdminCheat.ahk /out SysAdminCheat.exe

      - uses: actions/upload-artifact@v4
        with:
          name: SysAdminCheat
          path: SysAdminCheat.exe
